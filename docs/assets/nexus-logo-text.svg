<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="nexus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="nexusGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" rx="28" fill="#0a0a0f"/>

  <!-- Outer hexagon -->
  <g transform="translate(10,0)">
    <polygon points="90,25 155,62.5 155,137.5 90,175 25,137.5 25,62.5"
             fill="none" stroke="url(#nexus)" stroke-width="1.5" opacity="0.4"/>
    <polygon points="90,58 135,83.5 135,116.5 90,142 45,116.5 45,83.5"
             fill="none" stroke="url(#nexus)" stroke-width="1.5" opacity="0.4"/>
    <g stroke="url(#nexus)" stroke-width="1.2" opacity="0.3">
      <line x1="90" y1="25" x2="90" y2="58"/>
      <line x1="155" y1="62.5" x2="135" y2="83.5"/>
      <line x1="155" y1="137.5" x2="135" y2="116.5"/>
      <line x1="90" y1="175" x2="90" y2="142"/>
      <line x1="25" y1="137.5" x2="45" y2="116.5"/>
      <line x1="25" y1="62.5" x2="45" y2="83.5"/>
    </g>
    <g stroke="url(#nexus)" stroke-width="0.8" opacity="0.25">
      <line x1="155" y1="62.5" x2="90" y2="142"/>
      <line x1="25" y1="62.5" x2="90" y2="142"/>
      <line x1="90" y1="58" x2="155" y2="137.5"/>
      <line x1="90" y1="58" x2="25" y2="137.5"/>
    </g>
    <g fill="url(#nexus)">
      <circle cx="90" cy="25" r="4.5"/>
      <circle cx="155" cy="62.5" r="4.5"/>
      <circle cx="155" cy="137.5" r="4.5"/>
      <circle cx="90" cy="175" r="4.5"/>
      <circle cx="25" cy="137.5" r="4.5"/>
      <circle cx="25" cy="62.5" r="4.5"/>
    </g>
    <g fill="url(#nexus)" opacity="0.7">
      <circle cx="90" cy="58" r="3"/>
      <circle cx="135" cy="83.5" r="3"/>
      <circle cx="135" cy="116.5" r="3"/>
      <circle cx="90" cy="142" r="3"/>
      <circle cx="45" cy="116.5" r="3"/>
      <circle cx="45" cy="83.5" r="3"/>
    </g>
    <g stroke="url(#nexus)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 66 66 L 66 134"/>
      <path d="M 114 66 L 114 134"/>
      <path d="M 66 66 L 114 134"/>
    </g>
  </g>

  <!-- Nexus text -->
  <g transform="translate(185, 108)">
    <text x="0" y="0"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="52"
          font-weight="700"
          letter-spacing="4"
          fill="url(#nexus)">
      Nexus
    </text>
  </g>
</svg>
