name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build CLI (Linux)
        run: cargo build --release

      - name: Build Gateway (Linux)
        run: cd gateway && go build -o ../target/release/nexus-gateway .

      - name: Package Linux
        run: |
          mkdir -p dist/nexus-${{ github.ref_name }}-linux-x86_64
          cp target/release/nexus target/release/nexus-gateway gateway/gateway.json scripts/build-all.sh scripts/install.sh dist/nexus-${{ github.ref_name }}-linux-x86_64/
          cd dist && tar czf nexus-${{ github.ref_name }}-linux-x86_64.tar.gz nexus-${{ github.ref_name }}-linux-x86_64/

      - name: Cross-compile Windows
        run: |
          rustup target add x86_64-pc-windows-gnu
          cargo build --release --target x86_64-pc-windows-gnu
          GOOS=windows GOARCH=amd64 go build -o target/x86_64-pc-windows-gnu/release/nexus-gateway.exe ./gateway/
        continue-on-error: true

      - name: Package Windows
        run: |
          if [ -f target/x86_64-pc-windows-gnu/release/nexus.exe ]; then
            mkdir -p dist/nexus-${{ github.ref_name }}-windows-x86_64
            cp target/x86_64-pc-windows-gnu/release/nexus.exe dist/nexus-${{ github.ref_name }}-windows-x86_64/
            cp target/x86_64-pc-windows-gnu/release/nexus-gateway.exe dist/nexus-${{ github.ref_name }}-windows-x86_64/ 2>/dev/null || true
            cp gateway/gateway.json scripts/install.ps1 scripts/build-all.ps1 dist/nexus-${{ github.ref_name }}-windows-x86_64/
            cd dist && zip -r nexus-${{ github.ref_name }}-windows-x86_64.zip nexus-${{ github.ref_name }}-windows-x86_64/
          fi

      - name: Cross-compile macOS
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          GOOS=darwin GOARCH=amd64 go build -o target/x86_64-apple-darwin/release/nexus-gateway ./gateway/
        continue-on-error: true

      - name: Package macOS
        run: |
          if [ -f target/x86_64-apple-darwin/release/nexus ]; then
            mkdir -p dist/nexus-${{ github.ref_name }}-macos-x86_64
            cp target/x86_64-apple-darwin/release/nexus dist/nexus-${{ github.ref_name }}-macos-x86_64/
            cp target/x86_64-apple-darwin/release/nexus-gateway dist/nexus-${{ github.ref_name }}-macos-x86_64/ 2>/dev/null || true
            cp gateway/gateway.json scripts/install.sh scripts/build-all.sh dist/nexus-${{ github.ref_name }}-macos-x86_64/
            cd dist && tar czf nexus-${{ github.ref_name }}-macos-x86_64.tar.gz nexus-${{ github.ref_name }}-macos-x86_64/
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nexus ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: dist/*
