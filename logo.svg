<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 64">
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Dark pill background for contrast on any background -->
  <rect x="0" y="6" width="256" height="52" rx="26" fill="#0f0f17"/>

  <!-- Icon: Rounded square with gradient -->
  <rect x="8" y="10" width="44" height="44" rx="10" fill="url(#ng)"/>

  <!-- Hexagon network nodes -->
  <polygon points="30,16 38,21 38,31 30,36 22,31 22,21"
           fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <g stroke="rgba(255,255,255,0.15)" stroke-width="0.4">
    <line x1="38" y1="21" x2="30" y2="31"/>
    <line x1="22" y1="21" x2="30" y2="31"/>
  </g>
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="30" cy="16" r="1.5"/>
    <circle cx="38" cy="21" r="1.5"/>
    <circle cx="38" cy="31" r="1.5"/>
    <circle cx="30" cy="36" r="1.5"/>
    <circle cx="22" cy="31" r="1.5"/>
    <circle cx="22" cy="21" r="1.5"/>
  </g>

  <!-- Letter N -->
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 21 20 L 21 38"/>
    <path d="M 39 20 L 39 38"/>
    <path d="M 21 20 L 39 38"/>
  </g>

  <!-- Wordmark -->
  <text x="66" y="40" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#fff">Nexus</text>
  <text x="145" y="40" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="26" font-weight="300" fill="#a1a1aa">AI</text>
</svg>
